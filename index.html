<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunidad Discord</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:200px; /* más espacio arriba */
    color:white;
    overflow:hidden;
    background:#050505;
}

/* Partículas */
#particles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

.container{
    position:relative;
    z-index:2;
    background: rgba(10,10,10,0.93);
    padding:80px 30px 30px 30px; /* más espacio interno arriba */
    border-radius:25px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(120,0,255,0.25);
    text-align:center;
    width:90%;
    max-width:500px; /* un poco más ancho */
    border:1px solid rgba(120,0,255,0.25);
}

/* LOGO GRANDE */
.logo{
    position:absolute;
    top:-160px; 
    left:50%;
    transform:translateX(-50%);
    width:260px; /* mucho más grande */
    border-radius:50%;
    z-index:10;
    box-shadow:0 0 60px rgba(140,0,255,1);
    animation: flotar 4s ease-in-out infinite;
}

/* Animación flotante */
@keyframes flotar{
    0%{ transform:translate(-50%, 0px); }
    50%{ transform:translate(-50%, -20px); }
    100%{ transform:translate(-50%, 0px); }
}

h1{
    margin-top:30px;
    margin-bottom:20px;
    font-size:26px;
    color:#ffffff;
    text-shadow:0 0 18px rgba(120,0,255,0.8);
}

iframe{
    width:100%;
    height:500px;
    border:none;
    border-radius:20px;
    box-shadow:0 0 30px rgba(120,0,255,0.3);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

    <img src="iluminateds.webp" class="logo">

    <h1>Únete a nuestra comunidad 🚀</h1>

    <iframe 
        src="https://discord.com/widget?id=1426798100000804866&theme=dark"
        sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
    </iframe>

</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle {
    constructor(){
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 7 + 3;
        this.speedX = Math.random() * 0.4 - 0.2;
        this.speedY = Math.random() * 0.4 - 0.2;
        this.color = Math.random() > 0.5 
            ? "rgba(140,0,255,0.85)" 
            : "rgba(0,120,255,0.85)";
    }

    update(){
        this.x += this.speedX;
        this.y += this.speedY;

        if(this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if(this.y < 0 || this.y > canvas.height) this.speedY *= -1;
    }

    draw(){
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 30;
        ctx.shadowColor = this.color;
        ctx.fill();
    }
}

function init(){
    for(let i = 0; i < 50; i++){
        particlesArray.push(new Particle());
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particlesArray.forEach(p => {
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
